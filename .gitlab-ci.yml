# GitLab CI/CD Pipeline for tao-lightcone-cli
# This pipeline builds a C++ project with CMake that requires multiple system dependencies

stages:
  - build
  - test

variables:
  # Use a Docker image with development tools pre-installed
  # You may need to customize this based on your specific requirements
  DOCKER_IMAGE: "ubuntu:22.04"
  
  # Git submodule strategy - fetch submodules recursively
  GIT_SUBMODULE_STRATEGY: recursive
  
  # Build configuration
  CMAKE_BUILD_TYPE: "Debug"
  
  # Parallel build jobs
  MAKE_JOBS: "4"
  
  # HDF5 version
  HDF5_VERSION: "1.14.0"

# Define a template for installing dependencies
.install_dependencies: &install_dependencies
  - apt-get update -qq
  - apt-get install -y build-essential cmake git wget
  - apt-get install -y gcc-12 g++-12
  - apt-get install -y libboost-all-dev
  - apt-get install -y libopenmpi-dev openmpi-bin
  - apt-get install -y libgsl-dev
  - apt-get install -y pkg-config zlib1g-dev libsz2
  # Set GCC 12 as default
  - update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
  - update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
  
  # Set HDF5 installation directory
  - export HDF5_PREFIX=$CI_PROJECT_DIR/hdf5-install
  
  # Check if HDF5 is already built (from cache)
  - |
    if [ ! -f $HDF5_PREFIX/lib/libhdf5.so ]; then
      echo "Building HDF5 ${HDF5_VERSION} from source with MPI support..."
      cd /tmp
      wget https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.14/hdf5-${HDF5_VERSION}/src/hdf5-${HDF5_VERSION}.tar.gz
      tar -xzf hdf5-${HDF5_VERSION}.tar.gz
      cd hdf5-${HDF5_VERSION}
      export CC=mpicc
      export CXX=mpicxx
      ./configure --prefix=$HDF5_PREFIX --enable-parallel --enable-shared --enable-static
      make -j4
      make install
    else
      echo "HDF5 already installed, skipping build..."
    fi
  - cd $CI_PROJECT_DIR
  
  # Update library paths
  - export LD_LIBRARY_PATH=$HDF5_PREFIX/lib:$LD_LIBRARY_PATH
  - export PKG_CONFIG_PATH=$HDF5_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH
  - export PATH=$HDF5_PREFIX/bin:$PATH
  
  # Verify HDF5 installation
  - h5cc -show || echo "h5cc not found"
  - pkg-config --modversion hdf5 || echo "HDF5 pkg-config not found"

build:
  stage: build
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
    # Verify compiler versions
    - gcc --version
    - g++ --version
    - cmake --version
    - mpicc --version
    - mpicxx --version
    # Check HDF5 configuration
    - h5cc -show || echo "h5cc not found"
    - h5pcc -show || echo "h5pcc not found"
    - /usr/local/bin/h5dump --version || echo "h5dump not found"
  script:
    # Set environment variables for MPI compilers and HDF5
    - export CC=mpicc
    - export CXX=mpicxx
    - export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
    - export PKG_CONFIG_PATH=$HDF5_ROOT/lib/pkgconfig:$PKG_CONFIG_PATH
    - export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
    - export PATH=$HDF5_ROOT/bin:$PATH
    
    # Clean up any old CMake cache files
    - find . -name CMakeCache.txt -exec rm -f {} \;
    
    # Build PugiXML dependency first
    - echo "Building PugiXML..."
    - cd dep/pugixml-1.7/scripts
    - mkdir -p build
    - cd build
    - cmake -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -DCMAKE_INSTALL_PREFIX=.. -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx ..
    - make -j$MAKE_JOBS
    - make install
    - cd ../../../..
    
    # Build main project
    - echo "Building main project..."
    - cmake -B="./bin" -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -DPUGIXML_HOME=./dep/pugixml-1.7 -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx -DHDF5_ROOT=$HDF5_ROOT .
    - cd bin
    - make clean
    - make -j$MAKE_JOBS
  artifacts:
    paths:
      - bin/cli_lightcone
      - bin/*.a
    expire_in: 1 week
  cache:
    key: build-cache-$CI_COMMIT_REF_SLUG
    paths:
      - hdf5-install/
      - dep/pugixml-1.7/scripts/build/
      - bin/
    policy: pull-push

# Optional: Add a test stage if you have tests
test:
  stage: test
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
  script:
    # Run any tests here
    - echo "Running tests..."
    # Example: if you have test scripts in the tests/ directory
    - ls -la tests/
    # You could run something like:
    # - cd tests && bash test_cli_validation.sh
    - tests/test_cli_validation.sh || echo "No tests found or tests failed"
  dependencies:
    - build
  only:
    - main
    - merge_requests

# Alternative build job for Release mode
build_release:
  stage: build
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
  script:
    # Set environment variables for MPI compilers and HDF5
    - export CC=mpicc
    - export CXX=mpicxx
    - export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
    - export PKG_CONFIG_PATH=$HDF5_ROOT/lib/pkgconfig:$PKG_CONFIG_PATH
    - export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
    - export PATH=$HDF5_ROOT/bin:$PATH
    
    - find . -name CMakeCache.txt -exec rm -f {} \;
    - echo "Building PugiXML (Release)..."
    - cd dep/pugixml-1.7/scripts
    - mkdir -p build_release
    - cd build_release
    - cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=.. -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx ..
    - make -j$MAKE_JOBS
    - make install
    - cd ../../../..
    - echo "Building main project (Release)..."
    - cmake -B="./bin_release" -DCMAKE_BUILD_TYPE=Release -DPUGIXML_HOME=./dep/pugixml-1.7 -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx -DHDF5_ROOT=$HDF5_ROOT .
    - cd bin_release
    - make clean
    - make -j$MAKE_JOBS
  artifacts:
    paths:
      - bin_release/cli_lightcone
      - bin_release/*.a
    expire_in: 1 week
  only:
    - tags
    - main
  when: manual

# Code quality checks (optional)
code_quality:
  stage: test
  image: $DOCKER_IMAGE
  before_script:
    - apt-get update -qq
    - apt-get install -y clang-format clang-tidy
  script:
    - echo "Running code quality checks..."
    # Example clang-format check
    - find src/ -name "*.cc" -o -name "*.hh" | xargs clang-format --dry-run --Werror
  allow_failure: true
  only:
    - merge_requests
