# GitLab CI/CD Pipeline for tao-lightcone-cli
# This pipeline builds a C++ project with CMake that requires multiple system dependencies

stages:
  - build
  - test

variables:
  # Use a Docker image with development tools pre-installed
  # You may need to customize this based on your specific requirements
  DOCKER_IMAGE: "ubuntu:22.04"

  # Git submodule strategy - fetch submodules recursively
  GIT_SUBMODULE_STRATEGY: recursive

  # Build configuration
  CMAKE_BUILD_TYPE: "Debug"

  # Parallel build jobs
  MAKE_JOBS: "4"

  # HDF5 version
  HDF5_VERSION: "1.14.0"

# Define a template for installing dependencies
.install_dependencies: &install_dependencies
  - apt-get update -qq
  - apt-get install -y build-essential cmake git wget curl bc time
  - apt-get install -y gcc-12 g++-12
  - apt-get install -y libboost-all-dev
  - apt-get install -y libopenmpi-dev openmpi-bin
  - apt-get install -y libgsl-dev
  - apt-get install -y pkg-config zlib1g-dev libsz2
  - apt-get install -y python3 python3-venv python3-pip
  # Set GCC 12 as default
  - update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
  - update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100

  # Set HDF5 installation directory
  - export HDF5_PREFIX=$CI_PROJECT_DIR/hdf5-install

  # Check if HDF5 is already built (from cache)
  # Check for both library and compiler wrapper to ensure complete installation
  - |
    if [ ! -f $HDF5_PREFIX/lib/libhdf5.so ] || [ ! -f $HDF5_PREFIX/bin/h5pcc ]; then
      echo "Building HDF5 ${HDF5_VERSION} from source with MPI support..."
      cd /tmp
      wget https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.14/hdf5-${HDF5_VERSION}/src/hdf5-${HDF5_VERSION}.tar.gz
      tar -xzf hdf5-${HDF5_VERSION}.tar.gz
      cd hdf5-${HDF5_VERSION}
      export CC=mpicc
      export CXX=mpicxx
      ./configure --prefix=$HDF5_PREFIX --enable-parallel --enable-shared --enable-static
      make -j4
      make install
    else
      echo "HDF5 already installed, skipping build..."
    fi
  - cd $CI_PROJECT_DIR
  # Update library paths
  - export LD_LIBRARY_PATH=$HDF5_PREFIX/lib:$LD_LIBRARY_PATH
  - export PKG_CONFIG_PATH=$HDF5_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH
  - export PATH=$HDF5_PREFIX/bin:$PATH

  # Verify HDF5 installation
  - h5cc -show || h5pcc -show || echo "HDF5 compiler wrapper not found"
  - pkg-config --modversion hdf5 || echo "HDF5 pkg-config not found"

build:
  stage: build
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
    # Verify compiler versions
    - gcc --version
    - g++ --version
    - cmake --version
    - mpicc --version
    - mpicxx --version
    # Check HDF5 configuration
    - h5cc -show || echo "h5cc not found"
    - h5pcc -show || echo "h5pcc not found"
  script:
    # Set HDF5 environment so build_platform_aware.sh can find it
    - export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
    - export PKG_CONFIG_PATH=$HDF5_ROOT/lib/pkgconfig:$PKG_CONFIG_PATH
    - export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
    - export PATH=$HDF5_ROOT/bin:$PATH
    # Set up Python virtual environment (required by setup.sh)
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
    # Build using the platform-aware script with MPI enabled
    - USE_MPI=yes ./build_platform_aware.sh
  artifacts:
    paths:
      - bin/cli_lightcone
      - bin/sage2kdtree
      - bin/sage
      - bin/*.a
    expire_in: 1 week
  cache:
    - key: hdf5-cache
      paths:
        - hdf5-install/
      policy: pull-push
    - key: build-cache-$CI_COMMIT_REF_SLUG
      paths:
        - bin/
      policy: pull-push

# CLI validation tests.
test_cli_validation:
  stage: test
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
  script:
    - |
      export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
      export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
      export PATH=$HDF5_ROOT/bin:$PATH
      python3 -m venv .venv
      source .venv/bin/activate
      pip install -r requirements.txt
      echo "=== Working directory: $(pwd) ==="
      echo "=== bin/ directory contents: ==="
      ls -la bin/ 2>&1 || echo "bin/ directory not found"
      ls -la bin/cli_lightcone || { echo "ERROR: cli_lightcone not found in artifacts or cache"; exit 1; }
      tests/test_cli_validation.sh
  dependencies:
    - build
  cache:
    - key: hdf5-cache
      paths:
        - hdf5-install/
      policy: pull
    # Pull the build cache as a secondary source for bin/ alongside the artifact download
    - key: build-cache-$CI_COMMIT_REF_SLUG
      paths:
        - bin/
      policy: pull
  only:
    - main
    - merge_requests

# Full KD-tree verification: runs SAGE, builds KD-trees with both implementations, compares output
test_verify_kdtree:
  stage: test
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
  script:
    - |
      export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
      export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
      export PATH=$HDF5_ROOT/bin:$PATH
      export CC=mpicc
      export CXX=mpicxx

      # Pre-create Python venv so setup.sh finds it and doesn't fail
      python3 -m venv .venv
      source .venv/bin/activate
      pip install -r requirements.txt

      # Run the KD-tree verification from project root which handles:
      # 1. Cloning/Building SAGE
      # 2. Downloading trees (first_run.sh)
      # 3. Running SAGE -> HDF5 Output (output_sage_hdf5_one_step_benchmark)
      # 4. Running a sample kd-tree conversion

      echo "Running verification..."
      ./verify_kdtree_output.sh

      # Enforce success message check
      if ! grep -q "Plot saved as: lightcone_3d_SnapNum.png" verify_kdtree_output.txt; then
        echo "ERROR: CI Check Failed - Validation success message not found in logs."
        exit 1
      fi
  artifacts:
    paths:
      - verify_kdtree_output.txt
    when: always
    expire_in: 1 week
  dependencies:
    - build
  cache:
    - key: hdf5-cache
      paths:
        - hdf5-install/
      policy: pull
    - key: tree-files-v2
      paths:
        - tests/sage-model-tests/input/millennium/trees/
      policy: pull-push
  only:
    - main
    - merge_requests

# Alternative build job for Release mode
build_release:
  stage: build
  image: $DOCKER_IMAGE
  before_script:
    - *install_dependencies
  script:
    # Set environment variables for MPI compilers and HDF5
    - export CC=mpicc
    - export CXX=mpicxx
    - export HDF5_ROOT=$CI_PROJECT_DIR/hdf5-install
    - export PKG_CONFIG_PATH=$HDF5_ROOT/lib/pkgconfig:$PKG_CONFIG_PATH
    - export LD_LIBRARY_PATH=$HDF5_ROOT/lib:$LD_LIBRARY_PATH
    - export PATH=$HDF5_ROOT/bin:$PATH

    - find . -name CMakeCache.txt -exec rm -f {} \;
    - echo "Building main project (Release)..."
    - cmake -B="./bin_release" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=mpicc -DCMAKE_CXX_COMPILER=mpicxx -DHDF5_ROOT=$HDF5_ROOT .
    - cd bin_release
    - make clean
    - make -j$MAKE_JOBS
  artifacts:
    paths:
      - bin_release/cli_lightcone
      - bin_release/*.a
    expire_in: 1 week
  cache:
    key: hdf5-cache
    paths:
      - hdf5-install/
    policy: pull-push
  only:
    - tags
    - main
  when: manual

# Code quality checks (optional)
code_quality:
  stage: test
  image: $DOCKER_IMAGE
  before_script:
    - apt-get update -qq
    - apt-get install -y clang-format clang-tidy
  script:
    - echo "Running code quality checks..."
    # Example clang-format check
    - find src/ -name "*.cc" -o -name "*.hh" | xargs clang-format --dry-run --Werror
  allow_failure: true
  only:
    - merge_requests
